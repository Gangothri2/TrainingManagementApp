<div class="login-container">
  <div class="login-box">
    <h2>User Login</h2>
    
    <div class="form-group">
      <label>User ID</label>
      <input 
        type="text" 
        class="form-control" 
        [(ngModel)]="userId"
        [disabled]="loading">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input 
        type="password" 
        class="form-control" 
        [(ngModel)]="password"
        [disabled]="loading">
    </div>

    <button class="btn-login" (click)="onSubmit()" [disabled]="loading">
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <div class="divider">Or</div>
    <!-- Add this right after the h2 tag or before the form -->
<div *ngIf="errorMessage" class="error-message">
  {{ errorMessage }}
</div>

    <button class="btn-sso" [disabled]="loading">Login with SSO</button>

    <div class="forgot-password">
      <a href="#">Forgot Password?</a>
    </div>
  </div>
</div>
