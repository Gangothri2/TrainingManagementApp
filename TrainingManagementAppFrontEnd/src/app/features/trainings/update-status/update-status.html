<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Update Training Status</h4>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-bold">Training:</label>
            <p class="form-control-static">{{ trainingName }}</p>
          </div>

          <form [formGroup]="statusForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Status</label>
              <div *ngFor="let option of statusOptions" class="form-check">
                <input 
                  class="form-check-input" 
                  type="radio" 
                  [value]="option.value"
                  [id]="'status_' + option.value"
                  formControlName="status">
                <label class="form-check-label" [for]="'status_' + option.value">
                  {{ option.label }}
                </label>
              </div>
              <div *ngIf="statusForm.get('status')?.invalid && statusForm.get('status')?.touched" 
                   class="text-danger">
                Status is required
              </div>
            </div>

            <div class="mb-3" *ngIf="showExpectedDate">
              <label for="expectedCompletionDate" class="form-label">Expected Completion Date</label>
              <input 
                type="date" 
                class="form-control" 
                id="expectedCompletionDate" 
                formControlName="expectedCompletionDate"
                [class.is-invalid]="statusForm.get('expectedCompletionDate')?.invalid && statusForm.get('expectedCompletionDate')?.touched">
              <div class="invalid-feedback">
                Expected completion date is required when status is Delayed
              </div>
            </div>

            <div class="mb-3">
              <label for="comments" class="form-label">Comments</label>
              <textarea 
                class="form-control" 
                id="comments" 
                rows="3" 
                formControlName="comments"
                placeholder="Reason for delay or additional details"></textarea>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="loading">
  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
  {{ loading ? 'Saving...' : 'Save' }}
</button>
              <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
